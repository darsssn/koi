    <!--Main Function-->
    <script>
    const sections = ["General", "MITRE ATT&CK","Host", "File Event", "Rule", "Process Execution", "Initiator Details", "Target Process", "Causality Group Owner Details", "OS Parent"];
    const ignoreList = ["WFBenign", "WFBenignLC", "WFMalware", "WFUnknown"];
    
    function extractCortexAlertData() {
        
        const text = document.getElementById("inputText").value;
        const lines = text.split("\n");
    
        let currentSection = null;
        let skipSection = false;
        let isHostIpSection = false;  // Flag for Host IP collection
        let ipAddresses = [];         // Array to store multiple IPs
    
        const result = {};
        const errors = [];
    
        sections.forEach(section => result[section] = []);
    
        const ipRegex = /^(\d{1,3}\.){3}\d{1,3}$/;
    
        for (let line of lines) {
            const trimmed = line.trim();
            if (trimmed === "") continue;
    
            if (sections.includes(trimmed)) {
                currentSection = trimmed;
                skipSection = false;
                continue;
            }
    
            if (trimmed === "Tags" || trimmed === "QUICK LAUNCHER") {
                skipSection = true;
                continue;
            }
    
            if (skipSection) continue;
    
            if (ignoreList.some(word => trimmed.includes(word))) continue;
    
            // --- Improved Host IP collection ---
            if (trimmed.startsWith("Host IP")) {
                console.log("Detected Host IP header:", trimmed);
                isHostIpSection = true;
                ipAddresses = [];
                continue;
            }

            if (isHostIpSection) {
                if (ipRegex.test(trimmed)) {
                    console.log("Valid IP detected:", trimmed);
                    ipAddresses.push(trimmed);
                    continue; // prevent IP from entering Host section
                } else {
                    console.log("Non-IP detected, stopping IP collection:", trimmed);

                    if (ipAddresses.length > 0) {
                        result["Host"].push("Host IP");
                        result["Host"].push(ipAddresses.join(", "));
                        ipAddresses = [];
                    }

                    isHostIpSection = false;
                    // DO NOT continue here so this non-IP line gets processed normally
                }
            }
            // --- End Host IP collection ---
    
            if (currentSection === "Host") {
                result["Host"].push(trimmed);
            } else if (currentSection) {
                result[currentSection].push(trimmed);
            }
        }
    
        // Edge case: add remaining IPs if last lines are IPs
        if (ipAddresses.length > 0) {
            result["Host"].push("Host IP");
            result["Host"].push(ipAddresses.join(", "));
        }
    
        sections.forEach(section => {
            console.log(`Validating section '${section}' with length: ${result[section].length}`);

            // Skip MITRE ATT&CK validation
            if (section === "MITRE ATT&CK") return;

            if (result[section].length % 2 !== 0) {
                console.log(`Unparsed '${section}' section before validation:`, result[section]);
                errors.push("Invalid number of lines found in the " + section + " section.");
            }
        });
    
        if (errors.length > 0) {
            showNotification(errors, "error_invalid_lines");
            document.getElementById("outputText").value = "";
            return;
        }
    
        let output = "";
        removeNotification("error_invalid_lines");
    
    sections.forEach(section => {
        output += "----- " + section + " -----\n";
        const data = result[section];
    
        // Special handling for MITRE ATT&CK
        if (section === "MITRE ATT&CK") {
            data.forEach(line => {
                if (line.trim() !== "") {
                    output += line + "\n";
                }
            });
        } else {
            for (let i = 0; i < data.length; i += 2) {
                output += data[i] + ": " + data[i + 1] + "\n";
            }
        }
        output += "\n";
    });
    
        document.getElementById("outputText").value = output;
    }
    </script>
    <!--Main Function-->

    <!--Persistence-->
    <script>
      // Function to load saved values for the textboxes
      window.onload = function() {
        const savedValue1 = localStorage.getItem('koi_extractCortexAlertDInputText');
      
        if (savedValue1) {
          document.getElementById('inputText').value = savedValue1;
          extractCortexAlertData(); // Process the saved input on load
        }
      };
      
      // Save the value of Textbox 1 whenever it changes
      document.getElementById('inputText').addEventListener('input', function() {
        const value = this.value;
        localStorage.setItem('koi_extractCortexAlertDInputText', value);
      });
