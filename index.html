<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <!--begin::Third Party Plugin(OverlayScrollbars)-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="css/adminlte.css"/>
    <!--end::Required Plugin(AdminLTE)-->
    <!--begin::Third Party / Custom Plugins-->
    <script src="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/browser/overlayscrollbars.browser.es6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.min.js"></script>
    <script src="js/adminlte.js"></script>
    <!--end::Third Party / Custom Plugins-->
  
  <title>Welcome</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000000; /* optional dark background */
    }

    .welcome-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    }

    .progress-wrapper {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: min(300px, 80vw);
    }

    .logo {
      max-width: 500px;
      width: 60%;
      height: auto;
      animation: fadeIn 0.8s ease-in-out;
    }

    .loading-screen {
    position: fixed;
    inset: 0;
    background: #000; /* or #fff if you prefer */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    }

    .spinner-wrapper {
    position: relative;
    width: 420px;
    height: 420px;
    display: flex;
    justify-content: center;
    align-items: center;
    }

    .spinner-lg {
    width: 420px;
    height: 420px;
    border-width: 6px;
    }

    .spinner-logo {
    position: absolute;
    width: 250px;
    height: auto;
    animation: pulse 1.5s infinite ease-in-out;
    }

    .spinner-border {
    animation-duration: 4s; /* spinner speed */
    }

    @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.1); opacity: 1; }
    }
  </style>

  <script>
    // redirect after 3 seconds
setTimeout(() => {

  const target =
    localStorage.getItem("koi_redirect_target")
    || "draft.html";

  localStorage.removeItem("koi_redirect_target");

  localStorage.setItem("koi_last_visit", Date.now());

  window.location.href = target;

}, 3000);
  </script>
</head>

<body>
<div class="loading-screen">
  <div class="spinner-wrapper">

    <div class="spinner-border text-danger spinner-lg" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>

    <img src="assets/img/koi_welcome.png" class="spinner-logo" alt="Logo">

  </div>
</div>
</body>
</html>
