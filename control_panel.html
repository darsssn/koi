    <div class="app-wrapper">
      <!--begin::Header-->
      <nav class="app-header navbar navbar-expand bg-body">
        <!--begin::Container-->
        <div class="container-fluid">
          <!-- everything will be injected via navbar.js -->
        </div>
        <!--end::Container-->
      </nav>
      <!--end::Header-->
      <!--begin::Sidebar-->
      <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
        <!-- everything will be injected via sidebar.js -->
      </aside>
      <!--end::Sidebar-->
      <!--begin::App Main-->
      <main class="app-main">
        <!--begin::App Content Header-->
        <div class="app-content-header" style="height: 10px; padding-top: 5px; padding-bottom: 5px;">
          <!--begin::Container-->
          <div class="container-fluid">
            <!--begin::Row-->
                <!--put header here if needed---------------------------------------------------->
            <!--end::Row-->
          </div>
          <!--end::Container-->
        </div>
        <!--end::App Content Header-->
        <!--begin::App Content-->
        <div class="app-content">
          <!--begin::Container-->
          <div class="container-fluid">
            <!--begin::Row-->
            <div class="row g-3">
              <!--begin::Col-->
              <div class="col-md-12">
                <!--begin::Input Group-->
                <div class="card card-secondary card-outline mb-1">
                  <!--begin::Header-->
                    <!--put header here if needed---------------------------------------------------->
                  <!--end::Header-->
                  <!--begin::Body-->
                  <div class="card-body d-flex flex-column" style="height: 90vh;"> <!-- Adjust based on viewport height -->
                    <div class="d-flex justify-content-between align-items-center mb-1">
                      <label class="form-label fs-4">Control Panel</label>
                    </div>
                    <div class="border rounded p-3 mb-3">
                      <label class="form-label fs-5">Clear Cached Data</label>
                      <div class="form-text fs-6 mb-2">
                        Deletes cached localStorage entries starting with <code>koi_</code>.
                        This action cannot be undone.
                      </div>
                      <div class="d-grid gap-2">
                        <button type="button" class="btn btn-danger w-50" onclick="clearKoiLocks()">
                          <i class="bi bi-lock-fill"></i>
                          Clear locks
                        </button>
                        <button type="button" class="btn btn-warning w-50" onclick="clearKoiExceptOTP()">
                          <i class="bi bi-shield-exclamation"></i>
                          Clear all data (except OTP Generator Accounts)
                        </button>
                        <button type="button" class="btn btn-danger w-50" onclick="clearKoiStorage()">
                          <i class="bi bi-trash3-fill"></i>
                          Clear all data
                        </button>
                      </div>
                    </div>
                  </div>
                  <!--end::Body-->
                </div>
                <!--end::Input Group-->
              </div>
              <!--end::Col-->
            </div>
            <!--end::Row-->
          </div>
          <!--end::Container-->
        </div>
        <!--end::App Content-->
      </main>
      <!--end::App Main-->
    </div>
    <!--end::App Wrapper-->

    <!--Main Function-->
    <script>
      function clearKoiStorage() {
        if (!confirm("Delete all cached KOI data?")) {
          return;
        }

        const keysToDelete = [];

        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);

          if (key && key.startsWith("koi_")) {
            keysToDelete.push(key);
          }
        }

        keysToDelete.forEach(key => {
          localStorage.removeItem(key);
        });

        showToast(`Deleted ${keysToDelete.length} cached item(s).`);
        setTimeout(() => {
          window.location.href = "index.html";
        }, 2000);
      }

      function clearKoiLocks() {
        if (!confirm("Delete locks?")) {
          return;
        }

        for (let i = localStorage.length - 1; i >= 0; i--) {
          const key = localStorage.key(i);

          if (key && key.startsWith("koi_") && key.includes("lock")) {
            localStorage.removeItem(key);
          }
        }

        showToast("Locks cleared");
      }

      function clearKoiExceptOTP() {
        if (!confirm("Delete all cached KOI data except OTP accounts?")) {
          return;
        }
        
        const preserveKeys = [
          "koi_otp_accounts"
        ];

        for (let i = localStorage.length - 1; i >= 0; i--) {
          const key = localStorage.key(i);

          if (key && key.startsWith("koi_") && !preserveKeys.includes(key)) {
            localStorage.removeItem(key);
          }
        }

        showToast("KOI data cleared (OTP preserved)");
        setTimeout(() => {
          window.location.href = "index.html";
        }, 2000);
      }
    </script>
    <!--Main Function-->
