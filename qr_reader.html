<!doctype html>
<html lang="en">
  <!--begin::Head-->
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>QR Upload Reader</title>
    <!--begin::Accessibility Meta Tags-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#007bff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)" />
    <!--end::Accessibility Meta Tags-->
    <!--begin::Accessibility Features-->
    <!-- Skip links will be dynamically added by accessibility.js -->
    <meta name="supported-color-schemes" content="light dark" />
    <link rel="preload" href="css/adminlte.css" as="style" />
    <!--end::Accessibility Features-->
    <!--begin::Fonts-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css" media="print" onload="this.media='all'"/>
    <!--end::Fonts-->
    <!--begin::Third Party Plugin(OverlayScrollbars)-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/overlayscrollbars@2.11.0/styles/overlayscrollbars.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="css/adminlte.css"/>
    <!--end::Required Plugin(AdminLTE)-->
    <link href="css/custom.css" rel="stylesheet"> <!-- Link to Custom CSS -->
    <script src="js/navigation.js"></script> <!-- Link to dynamic navigation generator -->
    <script src="js/static_nav.js"></script> <!-- Link to static navigation generator -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script> <!-- Add jsQR Library -->
  </head>
  <!--end::Head-->

  <!--begin::Body-->
  <body class="layout-fixed sidebar-expand-lg sidebar-mini sidebar-collapse bg-body-tertiary">
    <!--begin::App Wrapper-->
    <div class="app-wrapper">
      <!--begin::Header-->
      <nav class="app-header navbar navbar-expand bg-body">
        <!--begin::Container-->
        <div class="container-fluid">
          <!-- everything will be injected via navbar.js -->
        </div>
        <!--end::Container-->
      </nav>
      <!--end::Header-->
      <!--begin::Sidebar-->
      <aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
        <!-- everything will be injected via sidebar.js -->
      </aside>
      <!--end::Sidebar-->
      <!--begin::App Main-->
      <main class="app-main">
        <!--begin::App Content Header-->
        <div class="app-content-header" style="height: 10px; padding-top: 5px; padding-bottom: 5px;">
          <!--begin::Container-->
          <div class="container-fluid">
            <!--begin::Row-->
                <!--put header here if needed---------------------------------------------------->
            <!--end::Row-->
          </div>
          <!--end::Container-->
        </div>
        <!--end::App Content Header-->
        <!--begin::App Content-->
        <div class="app-content">
          <!--begin::Container-->
          <div class="container-fluid">
            <!--begin::Row-->
            <div class="row g-3">
              <!--begin::Col-->
              <div class="col-md-12">
                <!--begin::Input Group-->
                <div class="card card-secondary card-outline mb-1">
                  <!--begin::Header-->
                    <!--put header here if needed---------------------------------------------------->
                  <!--end::Header-->
                  <!--begin::Body-->
                  <div class="card-body d-flex flex-column" style="height: 90vh;"> <!-- Adjust based on viewport height -->
                    <div class="d-flex justify-content-between align-items-center mb-1">
                      <label class="form-label">Output</label>
                      <div class="btn-group mb-2" role="group">
                        <button type="button" class="btn btn-secondary btn-toolbar1" onclick="window.location.reload()" title="Clear fields"><i class="bi bi-trash3-fill"></i></button>
                        <button type="button" class="btn btn-secondary btn-toolbar1" onclick="copyTextarea('outputText')" title="Copy output"><i class="bi bi-copy"></i></button>
                      </div>
                    </div>
                    <div class="flex-grow-1 d-flex justify-content-center align-items-center position-relative">
                    
                      <!-- Upload UI -->
                      <div id="uploadContainer" class="text-center w-100">
                        <div id="uploadArea" class="border rounded p-4 bg-body-tertiary mx-auto" style="max-width: 400px; cursor: pointer;">
                          <i class="bi bi-qr-code-scan fs-1 mb-2"></i>
                          <p class="mb-2">Click to upload QR image</p>
                          <input type="file" id="fileInput" accept="image/*" hidden>
                          <button class="btn btn-primary btn-sm">Choose File</button>
                        </div>
                      </div>
                      <!-- Output -->
                      <textarea 
                        readonly 
                        id="outputText" 
                        class="form-control position-absolute top-0 start-0 w-100 h-100 d-none"
                        placeholder="Decoded result will appear here...">
                      </textarea>
                    
                    </div>
                  </div>
                  <!--end::Body-->
                </div>
                <!--end::Input Group-->
              </div>
              <!--end::Col-->
            </div>
            <!--end::Row-->
          </div>
          <!--end::Container-->
        </div>
        <!--end::App Content-->
      </main>
      <!--end::App Main-->
    </div>
    <!--end::App Wrapper-->
    <!--Main Function-->
      <script>
      const fileInput = document.getElementById("fileInput");
      const uploadArea = document.getElementById("uploadArea");
      const uploadContainer = document.getElementById("uploadContainer");
      const outputText = document.getElementById("outputText");
      
      // Click upload area
      uploadArea.addEventListener("click", () => fileInput.click());
      
      fileInput.addEventListener("change", function () {
        const file = this.files[0];
        if (!file) return;
      
        if (!file.type.startsWith("image/")) {
          outputText.classList.remove("d-none");
          outputText.value = "Please upload a valid image.";
          return;
        }
      
        const reader = new FileReader();
      
        reader.onload = function (event) {
          const img = new Image();
      
          img.onload = function () {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
      
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
      
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, canvas.width, canvas.height);
      
            // Hide upload, show output
            uploadContainer.classList.add("d-none");
            outputText.classList.remove("d-none");
      
            if (code) {
              outputText.value = code.data;
            } else {
              outputText.value = "No QR code detected.";
            }
          };
      
          img.src = event.target.result;
        };
      
        reader.readAsDataURL(file);
      });
      </script>
    <!--Main Function-->

    <!--Persistence-->
    <!--Persistence-->

  </body>

</html>
